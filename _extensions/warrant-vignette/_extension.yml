title: warrant-vignette
author: Fitz
version: 0.1.0
quarto-required: ">=1.5.0"
contributes:
  formats:
    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
      # Default page geometry. The warrant-packet() function overrides
      # margins per-document, but this is the fallback for rendering
      # before warrant-packet() takes over.
      papersize: us-letter
      margin:
        top: 0.6in
        bottom: 0.7in
        x: 0.85in
      mainfont: "Liberation Serif"
      fontsize: 11pt
